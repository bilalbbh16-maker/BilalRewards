<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw - BilalRewards</title>
<link rel="stylesheet" href="css/style.css">
<script src="config/firebase-config.js"></script>
<script src="config/settings.js"></script>
<script src="js/withdraw.js"></script>
</head>
<body>
<header>
  <h1>Withdraw</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="game.html">Games</a>
    <a href="tasks.html">Tasks</a>
  </nav>
</header>

<main>
  <section>
    <h2>Withdraw your earnings</h2>
    <form id="withdraw-form">
      <label for="wallet">FaucetPay Email:</label>
      <input type="email" id="wallet" required placeholder="yourwallet@faucetpay.io"><br><br>

      <label for="amount">Amount ($USDT):</label>
      <input type="number" id="amount" required min="0.5" step="0.01"><br><br>

      <button type="submit">Withdraw</button>
    </form>
    <p id="withdraw-message"></p>
  </section>
</main>
</body>
</html>
